<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏏 Gali Cricket Pro Scorer</title>

<style>
:root{
    --primary:#16a34a;
    --secondary:#0f172a;
    --bg:#f1f5f9;
    --card:#ffffff;
    --danger:#ef4444;
    --warning:#f59e0b;
    --shadow:0 8px 25px rgba(0,0,0,0.08);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:var(--bg);
    padding:15px;
}

.container{
    max-width:900px;
    margin:auto;
}

.card{
    background:var(--card);
    border-radius:16px;
    padding:18px;
    margin-bottom:15px;
    box-shadow:var(--shadow);
}

h1{
    text-align:center;
    color:var(--secondary);
    margin-bottom:15px;
}

h2{
    margin-bottom:10px;
    color:var(--secondary);
}

.team-inputs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
}

input,select{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:10px;
    margin-bottom:10px;
    font-size:16px;
}

button{
    border:none;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:scale(1.02);
}

.add-btn{
    background:var(--primary);
    color:white;
    padding:12px;
    width:100%;
    border-radius:10px;
    font-size:16px;
    font-weight:bold;
}

.player-list{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
}

.player-chip{
    background:#e2e8f0;
    padding:8px 12px;
    border-radius:20px;
    font-size:14px;
}

.out-player{
    background:#fecaca;
    text-decoration:line-through;
}

.target-badge {
    background: var(--warning);
    color: #000;
    text-align: center;
    padding: 10px;
    border-radius: 10px;
    font-weight: bold;
    font-size: 18px;
    margin-bottom: 15px;
}

.result-badge {
    background: #dcfce7;
    color: #15803d;
    text-align: center;
    padding: 15px;
    border-radius: 12px;
    font-weight: bold;
    font-size: 20px;
    margin-bottom: 15px;
    border: 2px dashed #16a34a;
}

.scoreboard{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    text-align:center;
}

.score-box{
    background:#0f172a;
    color:white;
    border-radius:12px;
    padding:15px;
}

.score-box h3{
    font-size:28px;
    margin-top:5px;
}

.players-status{
    display:grid;
    grid-template-columns:1fr;
    gap:10px;
    margin-top:10px;
}

.status{
    background:#f8fafc;
    padding:12px;
    border-radius:10px;
    font-size:16px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.batsman-stats {
    font-weight:bold;
    color:var(--primary);
}

.run-buttons{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
}

.run-btn{
    background:var(--primary);
    color:white;
    font-size:20px;
    padding:15px;
    border-radius:12px;
    font-weight:bold;
}

.extra-btn{
    background:var(--warning);
    color:white;
    padding:14px;
    border-radius:12px;
    font-weight:bold;
    font-size:16px;
}

.action-buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.wicket-btn{
    background:var(--danger);
    color:white;
    padding:15px;
    border-radius:12px;
    font-size:18px;
    font-weight:bold;
}

.inn-btn {
    background: #3b82f6;
    color: white;
    padding: 15px;
    border-radius: 12px;
    font-size: 18px;
    font-weight: bold;
}

.log{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    min-height:40px;
}

.ball{
    background:#0f172a;
    color:white;
    padding:8px 12px;
    border-radius:20px;
}

.reset-btn{
    width:100%;
    background:var(--danger);
    color:white;
    padding:14px;
    border-radius:12px;
    font-size:16px;
}

@media(max-width:600px){
    .scoreboard{
        grid-template-columns:1fr;
    }
    .team-inputs {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>

<div class="container">

<h1>🏏 Gali Cricket Pro Scorer</h1>

<div class="card">
    <h2>Match Setup</h2>
    <div class="team-inputs">
        <input type="text" id="battingTeamInput" placeholder="Batting Team Name (e.g. Team A)" value="Team 1">
        <input type="text" id="bowlingTeamInput" placeholder="Bowling Team Name (e.g. Team B)" value="Team 2">
    </div>
    <input type="text" id="playerInput" placeholder="Enter player name and click Add">
    <button class="add-btn" style="background:#64748b; margin-bottom:15px;" onclick="addPlayer()">➕ Add Player to Squad</button>
    <div class="player-list" id="playerList"></div>
    <hr style="margin:15px 0; border:0; border-top:1px solid #ddd;">
    
    <label>⚡ Striker:</label>
    <select id="striker"></select>
    <label>🏏 Non-Striker:</label>
    <select id="nonStriker"></select>
    <label>🎯 Bowler:</label>
    <select id="bowler"></select>
    <button class="add-btn" onclick="saveSetup()">🚀 Start / Update Batsmen</button>
</div>

<div id="targetSection" class="card" style="display:none;">
    <div id="targetDisplay" class="target-badge">Target: -</div>
    <div id="equationDisplay" style="text-align:center; font-weight:bold; color:var(--secondary);"></div>
</div>

<div id="resultSection" class="result-badge" style="display:none;"></div>

<div class="card">
    <h2 id="liveMatchTitle" style="text-align:center; color:var(--primary); margin-bottom:10px;">Live Match</h2>
    <div class="scoreboard">
        <div class="score-box">
            <div>Score</div>
            <h3 id="score">0</h3>
        </div>
        <div class="score-box">
            <div>Wickets</div>
            <h3 id="wickets">0</h3>
        </div>
        <div class="score-box">
            <div>Overs</div>
            <h3 id="overs">0.0</h3>
        </div>
    </div>

    <div class="players-status">
        <div class="status">
            <div>⚡ Striker: <strong id="currentStriker">-</strong></div>
            <div class="batsman-stats" id="strikerStats">0 (0b) SR: 0</div>
        </div>
        <div class="status">
            <div>🏏 Non-Striker: <strong id="currentNonStriker">-</strong></div>
            <div class="batsman-stats" id="nonStrikerStats">0 (0b) SR: 0</div>
        </div>
        <div class="status">
            <div>🎯 Bowler: <strong id="currentBowler">-</strong></div>
        </div>
    </div>
</div>

<div class="card">
    <h2>Runs</h2>
    <div class="run-buttons">
        <button class="run-btn" onclick="addRuns(0)">0</button>
        <button class="run-btn" onclick="addRuns(1)">1</button>
        <button class="run-btn" onclick="addRuns(2)">2</button>
        <button class="run-btn" onclick="addRuns(3)">3</button>
        <button class="run-btn" onclick="addRuns(4)">4</button>
        <button class="run-btn" onclick="addRuns(6)">6</button>
    </div>
</div>

<div class="card">
    <h2>Extras</h2>
    <div class="run-buttons">
        <button class="extra-btn" onclick="wideBall()">WD</button>
        <button class="extra-btn" onclick="noBall()">NB</button>
        <button class="extra-btn" onclick="byeRuns()">Bye</button>
    </div>
</div>

<div class="card action-buttons">
    <button class="wicket-btn" onclick="wicket()">OUT</button>
    <button class="inn-btn" onclick="switchInnings()">End Innings 🔁</button>
</div>

<div class="card">
    <h2>Current Over</h2>
    <div class="log" id="overLog"></div>
</div>

<div class="card">
    <button class="reset-btn" onclick="resetMatch()">Reset Whole Match 🔄</button>
</div>

</div>

<script>
let state = {
    players: [],
    outPlayers: [],
    score: 0,
    wickets: 0,
    balls: 0,
    striker: "",
    nonStriker: "",
    bowler: "",
    overLog: [],
    batsmanScores: {}, 
    
    // Innings settings
    innings: 1,
    team1Name: "Team 1",
    team2Name: "Team 2",
    target: 0,
    matchEnded: false,
    winner: ""
};

loadData();

function saveData(){
    localStorage.setItem("galiCricketProScorer", JSON.stringify(state));
}

function loadData(){
    const saved = localStorage.getItem("galiCricketProScorer");
    if(saved){
        state = JSON.parse(saved);
        document.getElementById("battingTeamInput").value = state.innings === 1 ? state.team1Name : state.team2Name;
        document.getElementById("bowlingTeamInput").value = state.innings === 1 ? state.team2Name : state.team1Name;
    }
    renderPlayers();
    updateUI();
    updateDropdowns();
}

function initBatsmanStats(name) {
    if (name && !state.batsmanScores[name]) {
        state.batsmanScores[name] = { runs: 0, balls: 0 };
    }
}

function addPlayer(){
    const input = document.getElementById("playerInput");
    const name = input.value.trim();
    if(!name) return;
    if(!state.players.includes(name)){
        state.players.push(name);
    }
    input.value = "";
    updateDropdowns();
    renderPlayers();
    saveData();
}

function renderPlayers(){
    const list = document.getElementById("playerList");
    list.innerHTML = "";
    state.players.forEach(player=>{
        const div = document.createElement("div");
        div.className = state.outPlayers.includes(player) ? "player-chip out-player" : "player-chip";
        
        let statsText = "";
        if(state.batsmanScores[player]) {
            statsText = ` (${state.batsmanScores[player].runs} runs, ${state.batsmanScores[player].balls}b)`;
        }
        div.textContent = player + statsText;
        list.appendChild(div);
    });
}

function updateDropdowns(){
    const ids = ["striker","nonStriker","bowler"];
    ids.forEach(id=>{
        const select = document.getElementById(id);
        select.innerHTML = "<option value=''>Select " + id.toUpperCase() + "</option>";
        state.players.forEach(player=>{
            if(!state.outPlayers.includes(player)) {
                let option = document.createElement("option");
                option.value = player;
                option.textContent = player;
                select.appendChild(option);
            }
        });
    });
}

function saveSetup(){
    if (state.matchEnded) return;
    
    let bTeam = document.getElementById("battingTeamInput").value.trim() || "Team 1";
    let fTeam = document.getElementById("bowlingTeamInput").value.trim() || "Team 2";
    
    if(state.innings === 1) {
        state.team1Name = bTeam;
        state.team2Name = fTeam;
    } else {
        state.team2Name = bTeam;
        state.team1Name = fTeam;
    }

    state.striker = document.getElementById("striker").value;
    state.nonStriker = document.getElementById("nonStriker").value;
    state.bowler = document.getElementById("bowler").value;
    
    initBatsmanStats(state.striker);
    initBatsmanStats(state.nonStriker);
    
    updateUI();
    saveData();
}

function checkMatchStatus() {
    if(state.innings === 2) {
        if(state.score >= state.target) {
            state.matchEnded = true;
            state.winner = state.team2Name;
        } else if(state.wickets >= state.players.length - 1 && state.players.length > 1) {
            state.matchEnded = true;
            state.winner = state.team1Name;
        }
    }
}

function addRuns(runs){
    if (state.matchEnded) { alert("Match already ended!"); return; }
    if(!state.striker || !state.nonStriker){
        alert("Please set up Striker and Non-Striker first!");
        return;
    }
    state.score += runs;
    state.balls++;
    state.overLog.push(runs);
    
    initBatsmanStats(state.striker);
    state.batsmanScores[state.striker].runs += runs;
    state.batsmanScores[state.striker].balls += 1;

    if(runs % 2 === 1){
        swapBatsmen();
    }
    checkMatchStatus();
    overCompletion();
    updateUI();
    saveData();
}

function wideBall(){
    if (state.matchEnded) return;
    state.score += 1;
    state.overLog.push("WD");
    checkMatchStatus();
    updateUI();
    saveData();
}

function noBall(){
    if (state.matchEnded) return;
    state.score += 1;
    state.overLog.push("NB");
    checkMatchStatus();
    updateUI();
    saveData();
}

function byeRuns(){
    if (state.matchEnded) return;
    if(!state.striker || !state.nonStriker){
        alert("Please set up Striker and Non-Striker first!");
        return;
    }
    let runs = parseInt(prompt("Enter Bye Runs"));
    if(isNaN(runs)) return;
    state.score += runs;
    state.balls++;
    state.overLog.push("B"+runs);
    
    initBatsmanStats(state.striker);
    state.batsmanScores[state.striker].balls += 1;

    if(runs % 2 === 1){
        swapBatsmen();
    }
    checkMatchStatus();
    overCompletion();
    updateUI();
    saveData();
}

function wicket(){
    if (state.matchEnded) return;
    if(!state.striker || !state.nonStriker){
        alert("No batsmen are on the pitch!");
        return;
    }

    let choice = prompt("Who got out?\nType '1' for Striker ("+state.striker+")\nType '2' for Non-Striker ("+state.nonStriker+")");
    let outPlayer = "";
    if(choice === "1") outPlayer = state.striker;
    else if(choice === "2") outPlayer = state.nonStriker;

    if(!outPlayer){
        alert("Invalid selection! Type 1 or 2.");
        return;
    }

    initBatsmanStats(state.striker);
    if(outPlayer === state.striker) {
        state.batsmanScores[state.striker].balls += 1;
    }

    state.outPlayers.push(outPlayer);
    state.wickets++;
    state.balls++;
    state.overLog.push("W");

    checkMatchStatus();
    if(state.matchEnded) {
        overCompletion();
        updateDropdowns();
        renderPlayers();
        updateUI();
        saveData();
        return;
    }

    let available = state.players.filter(p =>
        !state.outPlayers.includes(p) && p !== state.striker && p !== state.nonStriker
    );

    if(available.length > 0){
        let newBatsman = prompt("New batsman name from available:\n" + available.join(", "));
        if(newBatsman) {
            let matchedNew = available.find(p => p.toLowerCase() === newBatsman.trim().toLowerCase());
            if(matchedNew) {
                if(outPlayer === state.striker) state.striker = matchedNew;
                else state.nonStriker = matchedNew;
                initBatsmanStats(matchedNew);
            } else {
                alert("Name didn't match. Set up manually via Match Setup.");
                if(outPlayer === state.striker) state.striker = "";
                else state.nonStriker = "";
            }
        } else {
            if(outPlayer === state.striker) state.striker = "";
            else state.nonStriker = "";
        }
    } else {
        alert("All players are OUT! Innings over.");
        if(outPlayer === state.striker) state.striker = "";
        else state.nonStriker = "";
        if(state.innings === 1) {
            switchInnings();
        } else {
            state.matchEnded = true;
            state.winner = state.team1Name;
        }
    }

    overCompletion();
    updateDropdowns();
    renderPlayers();
    updateUI();
    saveData();
}

function switchInnings() {
    if(state.innings === 2) {
        alert("Already in Innings 2!");
        return;
    }
    if(state.score === 0) {
        if(!confirm("Score is 0. Are you sure you want to end 1st Innings?")) return;
    }
    
    state.target = state.score + 1;
    alert(`1st Innings Over!\n${state.team1Name} scored: ${state.score}\nTarget for ${state.team2Name}: ${state.target} runs.`);
    
    state.innings = 2;
    state.score = 0;
    state.wickets = 0;
    state.balls = 0;
    state.striker = "";
    state.nonStriker = "";
    state.bowler = "";
    state.outPlayers = [];
    state.overLog = [];
    
    // Swap text fields
    document.getElementById("battingTeamInput").value = state.team2Name;
    document.getElementById("bowlingTeamInput").value = state.team1Name;
    
    updateDropdowns();
    updateUI();
    saveData();
}

function swapBatsmen(){
    let temp = state.striker;
    state.striker = state.nonStriker;
    state.nonStriker = temp;
}

function overCompletion(){
    if(state.balls % 6 === 0 && state.balls > 0 && !state.matchEnded){
        swapBatsmen();
        state.overLog = [];
        alert("Over complete! Strike rotated.");
    }
}

function getOvers(){
    let overs = Math.floor(state.balls / 6);
    let balls = state.balls % 6;
    return overs + "." + balls;
}

function calculateSR(runs, balls) {
    if (balls === 0) return 0;
    return Math.round((runs / balls) * 100);
}

function updateUI(){
    let currentBatting = state.innings === 1 ? state.team1Name : state.team2Name;
    document.getElementById("liveMatchTitle").textContent = `${currentBatting} is Batting (Innings ${state.innings})`;
    
    document.getElementById("score").textContent = state.score;
    document.getElementById("wickets").textContent = state.wickets;
    document.getElementById("overs").textContent = getOvers();
    document.getElementById("currentStriker").textContent = state.striker || "-";
    document.getElementById("currentNonStriker").textContent = state.nonStriker || "-";
    document.getElementById("currentBowler").textContent = state.bowler || "-";

    // Live Individual Batsman Score
    if(state.striker && state.batsmanScores[state.striker]) {
        let s = state.batsmanScores[state.striker];
        document.getElementById("strikerStats").textContent = `${s.runs} (${s.balls}b) SR: ${calculateSR(s.runs, s.balls)}`;
    } else {
        document.getElementById("strikerStats").textContent = "0 (0b) SR: 0";
    }

    if(state.nonStriker && state.batsmanScores[state.nonStriker]) {
        let ns = state.batsmanScores[state.nonStriker];
        document.getElementById("nonStrikerStats").textContent = `${ns.runs} (${ns.balls}b) SR: ${calculateSR(ns.runs, ns.balls)}`;
    } else {
        document.getElementById("nonStrikerStats").textContent = "0 (0b) SR: 0";
    }

    // Target Box Visibility
    if(state.innings === 2) {
        document.getElementById("targetSection").style.display = "block";
        document.getElementById("targetDisplay").textContent = `🎯 TARGET: ${state.target} (Runs needed: ${state.target - state.score})`;
        let runsNeeded = state.target - state.score;
        document.getElementById("equationDisplay").textContent = `${state.team2Name} needs ${runsNeeded} runs to win.`;
    } else {
        document.getElementById("targetSection").style.display = "none";
    }

    // Winner Display
    if(state.matchEnded) {
        document.getElementById("resultSection").style.display = "block";
        document.getElementById("resultSection").textContent = `🎉 🏆 WINNER: ${state.winner} WON THE MATCH! 🏆 🎉`;
    } else {
        document.getElementById("resultSection").style.display = "none";
    }

    // Render balls in over log
    const log = document.getElementById("overLog");
    log.innerHTML = "";
    state.overLog.forEach(ball=>{
        let span = document.createElement("div");
        span.className = "ball";
        span.textContent = ball;
        log.appendChild(span);
    });
}

function resetMatch(){
    if(confirm("Are you sure you want to completely RESET the match? This will delete all teams and runs.")){
        localStorage.removeItem("galiCricketProScorer");
        state = {
            players: [],
            outPlayers: [],
            score: 0,
            wickets: 0,
            balls: 0,
            striker: "",
            nonStriker: "",
            bowler: "",
            overLog: [],
            batsmanScores: {},
            innings: 1,
            team1Name: "Team 1",
            team2Name: "Team 2",
            target: 0,
            matchEnded: false,
            winner: ""
        };
        document.getElementById("battingTeamInput").value = "Team 1";
        document.getElementById("bowlingTeamInput").value = "Team 2";
        renderPlayers();
        updateDropdowns();
        updateUI();
    }
}
</script>

</body>
</html>
