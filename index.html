<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏏 Gali Cricket Scorer</title>

<style>
:root{
    --primary:#16a34a;
    --secondary:#0f172a;
    --bg:#f1f5f9;
    --card:#ffffff;
    --danger:#ef4444;
    --warning:#f59e0b;
    --shadow:0 8px 25px rgba(0,0,0,0.08);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:var(--bg);
    padding:15px;
}

.container{
    max-width:900px;
    margin:auto;
}

.card{
    background:var(--card);
    border-radius:16px;
    padding:18px;
    margin-bottom:15px;
    box-shadow:var(--shadow);
}

h1{
    text-align:center;
    color:var(--secondary);
    margin-bottom:15px;
}

h2{
    margin-bottom:10px;
    color:var(--secondary);
}

input,select{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:10px;
    margin-bottom:10px;
    font-size:16px;
}

button{
    border:none;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:scale(1.03);
}

.add-btn{
    background:var(--primary);
    color:white;
    padding:12px;
    width:100%;
    border-radius:10px;
    font-size:16px;
    font-weight:bold;
}

.player-list{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
}

.player-chip{
    background:#e2e8f0;
    padding:8px 12px;
    border-radius:20px;
    font-size:14px;
}

.out-player{
    background:#fecaca;
    text-decoration:line-through;
}

.scoreboard{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    text-align:center;
}

.score-box{
    background:#0f172a;
    color:white;
    border-radius:12px;
    padding:15px;
}

.score-box h3{
    font-size:28px;
    margin-top:5px;
}

.players-status{
    display:grid;
    grid-template-columns:1fr;
    gap:10px;
    margin-top:10px;
}

.status{
    background:#f8fafc;
    padding:12px;
    border-radius:10px;
    font-size:16px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.batsman-stats {
    font-weight:bold;
    color:var(--primary);
}

.run-buttons{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
}

.run-btn{
    background:var(--primary);
    color:white;
    font-size:20px;
    padding:15px;
    border-radius:12px;
    font-weight:bold;
}

.extra-btn{
    background:var(--warning);
    color:white;
    padding:14px;
    border-radius:12px;
    font-weight:bold;
    font-size:16px;
}

.wicket-btn{
    width:100%;
    background:var(--danger);
    color:white;
    padding:15px;
    border-radius:12px;
    font-size:18px;
    font-weight:bold;
}

.log{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    min-height:40px;
}

.ball{
    background:#0f172a;
    color:white;
    padding:8px 12px;
    border-radius:20px;
}

.reset-btn{
    width:100%;
    background:var(--danger);
    color:white;
    padding:14px;
    border-radius:12px;
    font-size:16px;
}

@media(max-width:600px){
    .scoreboard{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<div class="container">

<h1>🏏 Gali Cricket Scorer</h1>

<div class="card">
    <h2>Add Friends</h2>
    <input type="text" id="playerInput" placeholder="Enter player name">
    <button class="add-btn" onclick="addPlayer()">Add Player</button>
    <br><br>
    <div class="player-list" id="playerList"></div>
</div>

<div class="card">
    <h2>Match Setup</h2>
    <select id="striker"></select>
    <select id="nonStriker"></select>
    <select id="bowler"></select>
    <button class="add-btn" onclick="saveSetup()">Save Players</button>
</div>

<div class="card">
    <div class="scoreboard">
        <div class="score-box">
            <div>Score</div>
            <h3 id="score">0</h3>
        </div>
        <div class="score-box">
            <div>Wickets</div>
            <h3 id="wickets">0</h3>
        </div>
        <div class="score-box">
            <div>Overs</div>
            <h3 id="overs">0.0</h3>
        </div>
    </div>

    <div class="players-status">
        <div class="status">
            <div>⚡ Striker: <strong id="currentStriker">-</strong></div>
            <div class="batsman-stats" id="strikerStats">0 (0b) SR: 0</div>
        </div>
        <div class="status">
            <div>🏏 Non-Striker: <strong id="currentNonStriker">-</strong></div>
            <div class="batsman-stats" id="nonStrikerStats">0 (0b) SR: 0</div>
        </div>
        <div class="status">
            <div>🎯 Bowler: <strong id="currentBowler">-</strong></div>
        </div>
    </div>
</div>

<div class="card">
    <h2>Runs</h2>
    <div class="run-buttons">
        <button class="run-btn" onclick="addRuns(0)">0</button>
        <button class="run-btn" onclick="addRuns(1)">1</button>
        <button class="run-btn" onclick="addRuns(2)">2</button>
        <button class="run-btn" onclick="addRuns(3)">3</button>
        <button class="run-btn" onclick="addRuns(4)">4</button>
        <button class="run-btn" onclick="addRuns(6)">6</button>
    </div>
</div>

<div class="card">
    <h2>Extras</h2>
    <div class="run-buttons">
        <button class="extra-btn" onclick="wideBall()">WD</button>
        <button class="extra-btn" onclick="noBall()">NB</button>
        <button class="extra-btn" onclick="byeRuns()">Bye</button>
    </div>
</div>

<div class="card">
    <button class="wicket-btn" onclick="wicket()">OUT</button>
</div>

<div class="card">
    <h2>Current Over</h2>
    <div class="log" id="overLog"></div>
</div>

<div class="card">
    <button class="reset-btn" onclick="resetMatch()">Reset Match</button>
</div>

</div>

<script>
let state = {
    players: [],
    outPlayers: [],
    score: 0,
    wickets: 0,
    balls: 0,
    striker: "",
    nonStriker: "",
    bowler: "",
    overLog: [],
    batsmanScores: {} // Stores {playerName: {runs: 0, balls: 0}}
};

loadData();

function saveData(){
    localStorage.setItem("galiCricketScorer", JSON.stringify(state));
}

function loadData(){
    const saved = localStorage.getItem("galiCricketScorer");
    if(saved){
        state = JSON.parse(saved);
    }
    renderPlayers();
    updateUI();
    updateDropdowns();
}

function initBatsmanStats(name) {
    if (name && !state.batsmanScores[name]) {
        state.batsmanScores[name] = { runs: 0, balls: 0 };
    }
}

function addPlayer(){
    const input = document.getElementById("playerInput");
    const name = input.value.trim();
    if(!name) return;
    if(!state.players.includes(name)){
        state.players.push(name);
    }
    input.value = "";
    updateDropdowns();
    renderPlayers();
    saveData();
}

function renderPlayers(){
    const list = document.getElementById("playerList");
    list.innerHTML = "";
    state.players.forEach(player=>{
        const div = document.createElement("div");
        div.className = state.outPlayers.includes(player) ? "player-chip out-player" : "player-chip";
        
        let statsText = "";
        if(state.batsmanScores[player]) {
            statsText = ` (${state.batsmanScores[player].runs} runs, ${state.batsmanScores[player].balls}b)`;
        }
        div.textContent = player + statsText;
        list.appendChild(div);
    });
}

function updateDropdowns(){
    const ids = ["striker","nonStriker","bowler"];
    ids.forEach(id=>{
        const select = document.getElementById(id);
        select.innerHTML = "<option value=''>Select " + id.toUpperCase() + "</option>";
        state.players.forEach(player=>{
            if(!state.outPlayers.includes(player)) {
                let option = document.createElement("option");
                option.value = player;
                option.textContent = player;
                select.appendChild(option);
            }
        });
    });
}

function saveSetup(){
    state.striker = document.getElementById("striker").value;
    state.nonStriker = document.getElementById("nonStriker").value;
    state.bowler = document.getElementById("bowler").value;
    
    initBatsmanStats(state.striker);
    initBatsmanStats(state.nonStriker);
    
    updateUI();
    saveData();
}

function addRuns(runs){
    if(!state.striker || !state.nonStriker){
        alert("Please set up Striker and Non-Striker first!");
        return;
    }
    state.score += runs;
    state.balls++;
    state.overLog.push(runs);
    
    // Update Striker individual score
    initBatsmanStats(state.striker);
    state.batsmanScores[state.striker].runs += runs;
    state.batsmanScores[state.striker].balls += 1;

    if(runs % 2 === 1){
        swapBatsmen();
    }
    overCompletion();
    updateUI();
    saveData();
}

function wideBall(){
    state.score += 1;
    state.overLog.push("WD");
    updateUI();
    saveData();
}

function noBall(){
    state.score += 1;
    state.overLog.push("NB");
    updateUI();
    saveData();
}

function byeRuns(){
    if(!state.striker || !state.nonStriker){
        alert("Please set up Striker and Non-Striker first!");
        return;
    }
    let runs = parseInt(prompt("Enter Bye Runs"));
    if(isNaN(runs)) return;
    state.score += runs;
    state.balls++;
    state.overLog.push("B"+runs);
    
    // Bye runs do not go to batsman runs, but ball is faced
    initBatsmanStats(state.striker);
    state.batsmanScores[state.striker].balls += 1;

    if(runs % 2 === 1){
        swapBatsmen();
    }
    overCompletion();
    updateUI();
    saveData();
}

function wicket(){
    if(!state.striker || !state.nonStriker){
        alert("No batsmen are on the pitch!");
        return;
    }

    let choice = prompt("Who got out?\nType '1' for Striker ("+state.striker+")\nType '2' for Non-Striker ("+state.nonStriker+")");
    
    let outPlayer = "";
    if(choice === "1") {
        outPlayer = state.striker;
    } else if(choice === "2") {
        outPlayer = state.nonStriker;
    } else {
        let typed = (choice || "").trim().toLowerCase();
        if(typed === state.striker.toLowerCase()) outPlayer = state.striker;
        else if(typed === state.nonStriker.toLowerCase()) outPlayer = state.nonStriker;
    }

    if(!outPlayer){
        alert("Invalid selection! Enter 1 or 2.");
        return;
    }

    // Wicket counts as a ball faced for striker
    initBatsmanStats(state.striker);
    if(outPlayer === state.striker) {
        state.batsmanScores[state.striker].balls += 1;
    }

    state.outPlayers.push(outPlayer);
    state.wickets++;
    state.balls++;
    state.overLog.push("W");

    let available = state.players.filter(p =>
        !state.outPlayers.includes(p) &&
        p !== state.striker &&
        p !== state.nonStriker
    );

    if(available.length > 0){
        let newBatsman = prompt("New batsman name from available: \n" + available.join(", "));
        if(newBatsman) {
            let matchedNew = available.find(p => p.toLowerCase() === newBatsman.trim().toLowerCase());
            if(matchedNew) {
                if(outPlayer === state.striker){
                    state.striker = matchedNew;
                } else {
                    state.nonStriker = matchedNew;
                }
                initBatsmanStats(matchedNew);
            } else {
                alert("New batsman name didn't match. Please set them up in Match Setup manually.");
                if(outPlayer === state.striker) state.striker = "";
                else state.nonStriker = "";
            }
        } else {
            if(outPlayer === state.striker) state.striker = "";
            else state.nonStriker = "";
        }
    } else {
        alert("All players are OUT! Innings over.");
        if(outPlayer === state.striker) state.striker = "";
        else state.nonStriker = "";
    }

    overCompletion();
    updateDropdowns();
    renderPlayers();
    updateUI();
    saveData();
}

function swapBatsmen(){
    let temp = state.striker;
    state.striker = state.nonStriker;
    state.nonStriker = temp;
}

function overCompletion(){
    if(state.balls % 6 === 0 && state.balls > 0){
        swapBatsmen();
        state.overLog = [];
        alert("Over complete! Strike rotated.");
    }
}

function getOvers(){
    let overs = Math.floor(state.balls / 6);
    let balls = state.balls % 6;
    return overs + "." + balls;
}

function calculateSR(runs, balls) {
    if (balls === 0) return 0;
    return Math.round((runs / balls) * 100);
}

function updateUI(){
    document.getElementById("score").textContent = state.score;
    document.getElementById("wickets").textContent = state.wickets;
    document.getElementById("overs").textContent = getOvers();
    document.getElementById("currentStriker").textContent = state.striker || "-";
    document.getElementById("currentNonStriker").textContent = state.nonStriker || "-";
    document.getElementById("currentBowler").textContent = state.bowler || "-";

    // Update Live Batsman Scorecards
    if(state.striker && state.batsmanScores[state.striker]) {
        let s = state.batsmanScores[state.striker];
        document.getElementById("strikerStats").textContent = `${s.runs} (${s.balls}b) SR: ${calculateSR(s.runs, s.balls)}`;
    } else {
        document.getElementById("strikerStats").textContent = "0 (0b) SR: 0";
    }

    if(state.nonStriker && state.batsmanScores[state.nonStriker]) {
        let ns = state.batsmanScores[state.nonStriker];
        document.getElementById("nonStrikerStats").textContent = `${ns.runs} (${ns.balls}b) SR: ${calculateSR(ns.runs, ns.balls)}`;
    } else {
        document.getElementById("nonStrikerStats").textContent = "0 (0b) SR: 0";
    }

    const log = document.getElementById("overLog");
    log.innerHTML = "";
    state.overLog.forEach(ball=>{
        let span = document.createElement("div");
        span.className = "ball";
        span.textContent = ball;
        log.appendChild(span);
    });
}

function resetMatch(){
    if(confirm("Are you sure you want to reset the match? All scores will be cleared.")){
        localStorage.removeItem("galiCricketScorer");
        state = {
            players: [],
            outPlayers: [],
            score: 0,
            wickets: 0,
            balls: 0,
            striker: "",
            nonStriker: "",
            bowler: "",
            overLog: [],
            batsmanScores: {}
        };
        renderPlayers();
        updateDropdowns();
        updateUI();
    }
}
</script>

</body>
</html>
